<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>MoodRing</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      width: 100dvw;
      height: 100dvh;
      font-family: system-ui, -apple-system, sans-serif;
      touch-action: none;
    }

    canvas {
      display: block;
      width: 100dvw;
      height: 100dvh;
    }

    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: rgba(0, 0, 0, 0.9);
      color: #fff;
      cursor: pointer;
      border: none;
      width: 100%;
      padding: 24px;
      text-align: center;
    }

    #overlay h1 {
      font-size: 2.2rem;
      font-weight: 200;
      letter-spacing: 0.4em;
      text-transform: uppercase;
    }

    #overlay .subtitle {
      font-size: 0.8rem;
      opacity: 0.4;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    #overlay .tap-hint {
      font-size: 0.7rem;
      opacity: 0.2;
      letter-spacing: 0.1em;
      margin-top: 32px;
    }

    #overlay .error-msg {
      font-size: 0.75rem;
      color: #ff4444;
      opacity: 0.8;
      max-width: 280px;
      line-height: 1.5;
    }

    #toggle-btn {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: rgba(255, 255, 255, 0.35);
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 9px 18px;
      border-radius: 20px;
      cursor: pointer;
      display: none;
      white-space: nowrap;
    }

    #status {
      position: fixed;
      top: env(safe-area-inset-top, 20px);
      left: 50%;
      transform: translateX(-50%);
      margin-top: 16px;
      color: rgba(255, 255, 255, 0.2);
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      pointer-events: none;
      display: none;
    }

    #loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: 260px;
      margin-top: 48px;
    }

    #loading-label {
      font-size: 0.65rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      opacity: 0.45;
    }

    #loading-bar-track {
      width: 100%;
      height: 2px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
    }

    #loading-bar-fill {
      height: 100%;
      width: 0%;
      background: rgba(255, 255, 255, 0.55);
      border-radius: 2px;
      transition: width 0.25s ease-out;
    }

    #loading-pct {
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      opacity: 0.25;
      font-variant-numeric: tabular-nums;
    }

    #debug-panel {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      width: 300px;
      max-width: 90vw;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 10px 14px;
      pointer-events: none;
    }

    #debug-status {
      font-size: 0.6rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.3);
    }

    #debug-mood {
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      font-weight: 500;
      color: #fff;
      min-height: 1.2em;
    }

    #debug-snippet {
      font-size: 0.65rem;
      color: rgba(255, 255, 255, 0.35);
      line-height: 1.4;
      text-align: center;
      min-height: 1.2em;
      font-style: italic;
    }

    #debug-count {
      font-size: 0.55rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.15);
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="overlay">
    <h1>MoodRing</h1>
    <p class="subtitle">Real-time emotional tone</p>
    <p class="tap-hint" id="tap-hint">tap to begin</p>
    <p class="error-msg hidden" id="error-text"></p>

    <div id="loading-state" class="hidden">
      <p id="loading-label">Loading</p>
      <div id="loading-bar-track">
        <div id="loading-bar-fill"></div>
      </div>
      <p id="loading-pct">0%</p>
    </div>
  </div>

  <div id="status">Loading model…</div>
  <button id="toggle-btn">Proportional</button>

  <div id="debug-panel">
    <div id="debug-status">idle</div>
    <div id="debug-mood"></div>
    <div id="debug-snippet"></div>
    <div id="debug-count">0 chunks</div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
